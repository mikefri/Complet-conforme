<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importateur de Kits - Entrepot</title>
    <!-- On utilise Tailwind CSS pour le design rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librairie pour lire le Excel/CSV côté client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-md max-w-xl w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Alimentation des Kits & Emplacements</h1>
        <p class="text-gray-600 text-sm mb-6">Sélectionnez votre fichier Excel (.xlsx ou .csv) pour mettre à jour la base Firebase sans exploser les quotas.</p>

        <!-- Zone de dépôt du fichier -->
        <div class="border-4 border-dashed border-gray-200 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer" id="drop-zone">
            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" class="hidden">
            <label for="file-input" class="cursor-pointer">
                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v28a4 4 0 004 4h24a4 4 0 004-4V20L28 8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <p class="mt-1 text-sm text-gray-600 font-semibold">Cliquez pour charger ou glissez le fichier ici</p>
                <p class="text-xs text-gray-500">XLSX, XLS ou CSV uniquement</p>
            </label>
        </div>

        <!-- Statut du traitement -->
        <div id="status" class="mt-4 text-sm font-medium hidden p-3 rounded"></div>
    </div>

    <!-- Configuration et Logique Firebase -->
    <script type="module">
        // Importation des modules Firebase requis
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REMPLACEZ PAR VOS CONFIGURATIONS FIREBASE INTERNES
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT_ID.firebaseapp.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT_ID.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Récupération des éléments HTML
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');

        // Écouteur de changement de fichier
        fileInput.addEventListener('change', handleFile, false);

        function showStatus(message, isError = false) {
            statusDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            statusDiv.classList.add(isError ? 'bg-red-100' : 'bg-green-100');
            statusDiv.classList.add(isError ? 'text-red-800' : 'text-green-800');
            statusDiv.innerText = message;
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            showStatus("Lecture du fichier en cours...");
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // On prend la première feuille du fichier Excel
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // Conversion en JSON (Format: tableau d'objets)
                    // On attend des colonnes : id_kit, nom_kit, emplacement, composant, quantite
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if(jsonData.length === 0) {
                        throw new Error("Le fichier Excel semble vide.");
                    }

                    showStatus("Structuration des données pour le plan gratuit...");
                    
                    // ÉTAPE MAGIQUE : On regroupe par Kit pour économiser les écritures
                    const kitsRegroupes = {};

                    jsonData.forEach(ligne => {
                        const idKit = ligne.id_kit;
                        if (!idKit) return; // Ignore les lignes invalides

                        if (!kitsRegroupes[idKit]) {
                            kitsRegroupes[idKit] = {
                                nom_du_kit: ligne.nom_kit || "Nom inconnu",
                                emplacement_theorique: ligne.emplacement || "Non assigné",
                                composants: []
                            };
                        }

                        // On ajoute le composant dans le tableau du Kit
                        if (ligne.composant) {
                            kitsRegroupes[idKit].composants.push({
                                nom: ligne.composant,
                                quantite_requise: Number(ligne.quantite) || 1
                            });
                        }
                    });

                    // ÉTAPE D'ÉCRITURE DANS FIREBASE
                    let compteurEcritures = 0;
                    const totalKits = Object.keys(kitsRegroupes).length;

                    for (const idKit in kitsRegroupes) {
                        // On crée ou écrase le document du Kit (1 seule écriture par Kit complet !)
                        await setDoc(doc(db, "nomenclature_kits", idKit), kitsRegroupes[idKit]);
                        
                        // Optionnel : On met aussi à jour l'emplacement si besoin
                        const idEmplacement = kitsRegroupes[idKit].emplacement_theorique;
                        if (idEmplacement !== "Non assigné") {
                            await setDoc(doc(db, "emplacements", idEmplacement), {
                                id_kit_stocke: idKit,
                                statut: "Occupe",
                                derniere_verification: new Date().toISOString()
                            }, { merge: true }); // merge: true évite d'effacer les autres données de l'emplacement
                            compteurEcritures++;
                        }

                        compteurEcritures++;
                        showStatus(`Importation : ${compteurEcritures} opérations effectuées...`);
                    }

                    showStatus(`Succès ! ${totalKits} kits mis à jour en base de données (${compteurEcritures} écritures Firebase utilisées).`);

                } catch (error) {
                    console.error(error);
                    showStatus("Erreur lors du traitement : " + error.message, true);
                }
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
