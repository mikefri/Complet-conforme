<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importateur de Kits - Entrepôt</title>
    <!-- Tailwind CSS pour un design propre et moderne -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librairie XLSX pour lire les fichiers Excel/CSV directement dans le navigateur -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-md max-w-xl w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Alimentation des Kits & Emplacements</h1>
        <p class="text-gray-600 text-sm mb-6">
            Sélectionnez votre fichier Excel (.xlsx ou .csv). <br>
            <span class="font-semibold text-blue-600">Sécurité activée :</span> L'outil ignore les kits déjà existants pour protéger vos quotas Firebase gratuits.
        </p>

        <!-- Zone de dépôt / Sélection du fichier -->
        <div class="border-4 border-dashed border-gray-200 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer" id="drop-zone">
            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" class="hidden">
            <label for="file-input" class="cursor-pointer">
                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v28a4 4 0 004 4h24a4 4 0 004-4V20L28 8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <p class="mt-1 text-sm text-gray-600 font-semibold">Cliquez pour charger ou glissez le fichier ici</p>
                <p class="text-xs text-gray-500">XLSX, XLS ou CSV uniquement</p>
            </label>
        </div>

        <!-- Zone d'affichage du Statut (Succès / Erreur / Chargement) -->
        <div id="status" class="mt-4 text-sm font-medium hidden p-3 rounded"></div>
    </div>

    <!-- Logique Firebase (Version Web v10) -->
    <script type="module">
        // Importation des modules officiels de Firebase depuis le CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REMPLACEZ LES VALEURS CI-DESSOUS PAR VOS PROPRES CLÉS CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT_ID.firebaseapp.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT_ID.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // Initialisation de Firebase et de Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Liaison avec les éléments du HTML
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');

        // Déclenchement de la fonction dès qu'un fichier est choisi
        fileInput.addEventListener('change', handleFile, false);

        // Fonction utilitaire pour afficher les messages à l'utilisateur
        function showStatus(message, isError = false) {
            statusDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-blue-100', 'text-blue-800', 'bg-red-100', 'text-red-800');
            
            if (isError) {
                statusDiv.classList.add('bg-red-100', 'text-red-800');
            } else if (message.includes("en cours") || message.includes("Vérification")) {
                statusDiv.classList.add('bg-blue-100', 'text-blue-800');
            } else {
                statusDiv.classList.add('bg-green-100', 'text-green-800');
            }
            
            statusDiv.classList.remove('hidden');
            statusDiv.innerText = message;
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            showStatus("Lecture du fichier Excel en cours...");
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // Récupération de la première feuille du classeur Excel
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // Conversion des lignes Excel en tableau d'objets JavaScript
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length === 0) {
                        throw new Error("Le fichier Excel lu semble vide ou mal formaté.");
                    }

                    showStatus("Vérification des kits déjà existants dans Firebase...");
                    
                    // 1. PROTECTION PLAN GRATUIT : On télécharge d'abord la liste des IDs existants (coûte très peu de quotas)
                    const querySnapshot = await getDocs(collection(db, "nomenclature_kits"));
                    const kitsExistants = new Set();
                    
                    querySnapshot.forEach((doc) => {
                        kitsExistants.add(doc.id); // On stocke l'ID du kit dans notre liste de comparaison locale
                    });

                    showStatus("Regroupement des lignes du fichier Excel...");
                    
                    // 2. REGROUPEMENT LOCAL : On transforme les lignes individuelles en paquets par Kit
                    const kitsRegroupes = {};

                    jsonData.forEach(ligne => {
                        const idKit = ligne.id_kit;
                        if (!idKit) return; // Saute la ligne si l'identifiant du kit est vide

                        // Si le kit n'est pas encore initialisé dans notre liste locale, on le crée
                        if (!kitsRegroupes[idKit]) {
                            kitsRegroupes[idKit] = {
                                nom_du_kit: ligne.nom_kit || "Nom non spécifié",
                                emplacement_theorique: ligne.emplacement || "Non assigné",
                                composants: []
                            };
                        }

                        // On ajoute le composant à la liste interne du Kit
                        if (ligne.composant) {
                            kitsRegroupes[idKit].composants.push({
                                nom: ligne.composant,
                                quantite_requise: Number(ligne.quantite) || 1
                            });
                        }
                    });

                    // 3. ENVOI FILTRÉ VERS FIREBASE
                    let compteurEcritures = 0;
                    let kitsIgnores = 0;

                    for (const idKit in kitsRegroupes) {
                        
                        // 🔥 SÉCURITÉ : Si le kit existe déjà dans Firebase, on refuse de l'écrire
                        if (kitsExistants.has(idKit)) {
                            kitsIgnores++;
                            continue; // Arrête ici pour ce kit et passe immédiatement au suivant
                        }

                        // Si le code arrive ici, c'est que le kit est 100% nouveau
                        // Étape A : Création de la nomenclature du Kit
                        await setDoc(doc(db, "nomenclature_kits", idKit), kitsRegroupes[idKit]);
                        compteurEcritures++;
                        
                        // Étape B : Assignation de l'emplacement du Kit
                        const idEmplacement = kitsRegroupes[idKit].emplacement_theorique;
                        if (idEmplacement !== "Non assigné") {
                            await setDoc(doc(db, "emplacements", idEmplacement), {
                                id_kit_stocke: idKit,
                                statut: "Occupé",
                                derniere_mise_a_jour: new Date().toISOString()
                            }, { merge: true }); // merge: true protège les autres champs existants de l'emplacement
                            compteurEcritures++;
                        }

                        showStatus(`Enregistrement : ${compteurEcritures} opérations écrites...`);
                    }

                    // Message final de compte-rendu
                    showStatus(`Traitement terminé avec succès ! ${compteurEcritures} écritures utilisées pour les nouveaux kits. ${kitsIgnores} kits déjà présents ont été ignorés de manière sécurisée.`);

                } catch (error) {
                    console.error(error);
                    showStatus("Erreur lors de l'intégration : " + error.message, true);
                }
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
